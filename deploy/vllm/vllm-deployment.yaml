# Serveur VLM on-premise (vLLM, compatible OpenAI) sur node pool GPU, in-VPC.
# Sert Qwen2.5-VL ; expose un Service in-cluster `vllm` que l'app cible via
# EMPREINTE_LLM_API_BASE=http://vllm.empreinte.svc.cluster.local:8000/v1
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: empreinte
  labels:
    app.kubernetes.io/name: vllm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vllm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vllm
    spec:
      nodeSelector:
        cloud.google.com/gke-accelerator: nvidia-l4
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: vllm
          image: vllm/vllm-openai:latest
          args:
            - "--model=Qwen/Qwen2.5-VL-7B-Instruct"
            - "--guided-decoding-backend=outlines"
            - "--max-model-len=8192"
          ports:
            - name: http
              containerPort: 8000
          resources:
            limits:
              nvidia.com/gpu: "1"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: vllm
  namespace: empreinte
  labels:
    app.kubernetes.io/name: vllm
spec:
  selector:
    app.kubernetes.io/name: vllm
  ports:
    - name: http
      port: 8000
      targetPort: http
