services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      qdrant:
        condition: service_started
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.13.0
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # VLM on-premise compatible OpenAI (souverainete des donnees).
  # Apres demarrage : `docker compose exec ollama ollama pull llama3.2-vision`
  # puis renseigner EMPREINTE_LLM_API_BASE=http://ollama:11434/v1 dans .env.
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  qdrant_data:
  ollama_data:
