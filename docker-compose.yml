services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      EMPREINTE_SQL_DSN: postgresql+psycopg://empreinte:empreinte@postgres:5432/empreinte
      EMPREINTE_OBJECT_STORE_ENDPOINT: http://minio:9000
      EMPREINTE_OBJECT_STORE_BUCKET: empreinte
      EMPREINTE_OBJECT_STORE_ACCESS_KEY: minioadmin
      EMPREINTE_OBJECT_STORE_SECRET_KEY: minioadmin
      EMPREINTE_QDRANT_URL: http://qdrant:6333
      # Decommenter apres `docker compose exec ollama ollama pull llama3.2-vision`
      # EMPREINTE_LLM_API_BASE: http://ollama:11434/v1
    depends_on:
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      qdrant:
        condition: service_started
    restart: unless-stopped

  migrate:
    build: .
    command: ["alembic", "upgrade", "head"]
    environment:
      EMPREINTE_SQL_DSN: postgresql+psycopg://empreinte:empreinte@postgres:5432/empreinte
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: empreinte
      POSTGRES_PASSWORD: empreinte
      POSTGRES_DB: empreinte
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U empreinte -d empreinte"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
      mc mb --ignore-existing local/empreinte;
      "

  qdrant:
    image: qdrant/qdrant:v1.13.0
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # VLM on-premise compatible OpenAI (souverainete des donnees).
  # Apres demarrage : `docker compose exec ollama ollama pull llama3.2-vision`
  # puis decommenter EMPREINTE_LLM_API_BASE dans le service app.
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
  qdrant_data:
  ollama_data:
